<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelis con Val</title>
<style>
  :root{
    --bg:#f6f5f2;
    --card:#ffffff;
    --ink:#1f1e1c;
    --muted:#7a7770;
    --line:#e6e3dc;
    --accent:#3c5f4f;
    --accent-ink:#ffffff;
    --danger:#a13d3d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 16px;
  }
  .wrap{width:100%;max-width:520px;}
  h1{font-size:22px;font-weight:600;margin:0 0 4px;}
  p.sub{color:var(--muted);font-size:14px;margin:0 0 28px;}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
  }
  form{display:flex;gap:8px;margin-bottom:16px;}
  input[type=text]{
    flex:1;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:15px;
    background:#fbfaf8;
    color:var(--ink);
  }
  input[type=text]:focus{outline:2px solid var(--accent);outline-offset:1px;}
  button{
    cursor:pointer;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:500;
    padding:10px 16px;
  }
  button.add{background:var(--accent);color:var(--accent-ink);}
  button.add:disabled{opacity:.5;cursor:default;}
  ul{list-style:none;margin:0;padding:0;}
  li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 4px;
    border-bottom:1px solid var(--line);
    font-size:15px;
  }
  li:last-child{border-bottom:none;}
  li .actions{display:flex;gap:6px;}
  li .remove{
    background:none;
    color:var(--danger);
    font-size:13px;
    padding:4px 8px;
  }
  li .remove:hover{text-decoration:underline;}
  li .seen{
    background:none;
    color:var(--accent);
    font-size:13px;
    padding:4px 8px;
  }
  li .seen:hover{text-decoration:underline;}
  .empty{color:var(--muted);font-size:14px;padding:12px 4px;}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tabs button{
    flex:1;
    background:#fbfaf8;
    border:1px solid var(--line);
    color:var(--muted);
  }
  .tabs button.active{
    background:var(--accent);
    color:var(--accent-ink);
    border-color:var(--accent);
  }
  .status{font-size:13px;color:var(--muted);margin-top:14px;min-height:16px;}
  .status.error{color:var(--danger);}
  .setup{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px;
    font-size:14px;
    line-height:1.6;
  }
  .setup code{background:#efece5;padding:1px 5px;border-radius:4px;font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Pelis con Val</h1>
  <p class="sub" id="subtitle">Cargando…</p>

  <div id="app"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const app = document.getElementById('app');
const subtitle = document.getElementById('subtitle');

let BIN_ID = params.get('bin');
let API_KEY = params.get('key');

if(BIN_ID && API_KEY){
  localStorage.setItem('lista_bin', BIN_ID);
  localStorage.setItem('lista_key', API_KEY);
  history.replaceState({}, '', window.location.pathname);
} else {
  BIN_ID = localStorage.getItem('lista_bin');
  API_KEY = localStorage.getItem('lista_key');
}

if(!BIN_ID || !API_KEY){
  subtitle.textContent = 'Falta configuración';
  app.innerHTML = `
    <div class="setup">
      Entrá una vez con tu bin y tu clave en la URL, la página los va a recordar:<br><br>
      <code>index.html?bin=TU_BIN_ID&key=TU_MASTER_KEY</code><br><br>
      Después de eso, podés usar el link corto sin parámetros.
    </div>`;
} else {
  init();
}

let activeTab = 'no_vistas';

async function init(){
  renderLoading('Cargando lista…');
  try{
    const data = await getData();
    render(data);
  }catch(e){
    renderError(e.message);
  }
}

async function getData(){
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { 'X-Master-Key': API_KEY }
  });
  if(!res.ok) throw new Error('No se pudo cargar la lista (revisá el bin o la clave).');
  const json = await res.json();
  return {
    no_vistas: Array.isArray(json.record?.no_vistas) ? json.record.no_vistas : [],
    vistas: Array.isArray(json.record?.vistas) ? json.record.vistas : []
  };
}

async function saveData(data){
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': API_KEY
    },
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error('No se pudo guardar el cambio.');
}

function renderLoading(msg){
  subtitle.textContent = msg;
  app.innerHTML = `<div class="card"><p class="empty">${msg}</p></div>`;
}

function renderError(msg){
  subtitle.textContent = 'Error';
  app.innerHTML = `<div class="card"><p class="status error">${msg}</p></div>`;
}

function render(data){
  const list = data[activeTab];
  subtitle.textContent = `${list.length} en "${activeTab === 'no_vistas' ? 'no vistas' : 'vistas'}"`;

  const items = list.length
    ? list.map((n,i)=>`
        <li>
          <span>${escapeHtml(n)}</span>
          <div class="actions">
            ${activeTab === 'no_vistas' ? `<button class="seen" data-index="${i}">Visto</button>` : ''}
            <button class="remove" data-index="${i}">Quitar</button>
          </div>
        </li>`).join('')
    : `<li class="empty">Todavía no hay nada acá.</li>`;

  app.innerHTML = `
    <div class="tabs">
      <button data-tab="no_vistas" class="${activeTab==='no_vistas'?'active':''}">No vistas</button>
      <button data-tab="vistas" class="${activeTab==='vistas'?'active':''}">Vistas</button>
    </div>
    <div class="card">
      ${activeTab === 'no_vistas' ? `
        <form id="add-form">
          <input type="text" id="new-name" placeholder="Título de la peli" autocomplete="off" />
          <button type="submit" class="add">Agregar</button>
        </form>` : ''}
      <ul>${items}</ul>
      <p class="status" id="status"></p>
    </div>
    <p class="sub" style="margin-top:14px;"><a href="#" id="forget" style="color:var(--muted);">Olvidar esta configuración</a></p>`;

  app.querySelectorAll('.tabs button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTab = btn.dataset.tab;
      render(data);
    });
  });

  document.getElementById('forget').addEventListener('click', (e)=>{
    e.preventDefault();
    localStorage.removeItem('lista_bin');
    localStorage.removeItem('lista_key');
    window.location.reload();
  });

  const addForm = document.getElementById('add-form');
  if(addForm){
    addForm.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const input = document.getElementById('new-name');
      const value = input.value.trim();
      if(!value) return;
      await withStatus(async ()=>{
        const current = await getData();
        current.no_vistas.push(value);
        await saveData(current);
        render(current);
      }, 'Guardando…');
    });
  }

  app.querySelectorAll('.seen').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const idx = parseInt(btn.dataset.index, 10);
      await withStatus(async ()=>{
        const current = await getData();
        const [item] = current.no_vistas.splice(idx, 1);
        if(item !== undefined) current.vistas.push(item);
        await saveData(current);
        render(current);
      }, 'Marcando como vista…');
    });
  });

  app.querySelectorAll('.remove').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const idx = parseInt(btn.dataset.index, 10);
      await withStatus(async ()=>{
        const current = await getData();
        current[activeTab].splice(idx, 1);
        await saveData(current);
        render(current);
      }, 'Quitando…');
    });
  });
}

async function withStatus(fn, msg){
  const statusEl = document.getElementById('status');
  if(statusEl) statusEl.textContent = msg;
  try{
    await fn();
  }catch(e){
    const s = document.getElementById('status');
    if(s){ s.textContent = e.message; s.classList.add('error'); }
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
